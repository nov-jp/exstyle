name: Sync PHP Subtree
on:
  push:
    branches:
      - main
    paths:
      - 'packages/php/**' # packages/php 内に変更があった時だけ実行
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴をすべて取得（subtreeプッシュに必要）
          token: ${{ secrets.SYNC_TOKEN }}
      - name: Push to PHP repo
        run: |
          # Git のユーザー設定（Actionの履歴用）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 同期先リポジトリのURLをセット
          # PATを使用して認証済みのURLを生成
          REMOTE_URL="https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/${{ github.repository_owner }}/exstyle-php.git"

          # subtreeを分割してプッシュ
          # --prefix=packages/php の中身だけを送り出す
          git subtree push --prefix=packages/php "$REMOTE_URL" main
